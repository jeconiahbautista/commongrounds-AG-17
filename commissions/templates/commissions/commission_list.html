{% extends 'base.html' %}
{% load static %}

{% block body %}
<h1> Commission Requests List</h1>
        <div class="main-content">
            {% for commission in object_list %}
                <div class="card">
                    <ul>
                        <li>
                            <h2> {{ commission.title }}</h2>
                            <p><strong>Category:</strong> {{ commission.type }}</p>
                            <p>{{ commission.description|truncatechars:30 }} </p>
                            <a href='{{ commission.get_absolute_url }}'> View Details </a>
                        </li>
                    </ul>
                </div>
            {% endfor %}
        </div>
{% endblock %}
