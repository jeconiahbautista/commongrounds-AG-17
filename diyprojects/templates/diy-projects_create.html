{% extends 'base.html' %}

{% block body %}
<div class="container">
    <h1>Add a Project</h1>
    <form action="/diyprojects/projects/" method="POST">
        {% csrf_token %}
        <ul>
            <li>
                <label for="title">
                    <span><strong>Title: </strong></span>
                    {{ project_form.title }}
                </label>
            </li>
            <li>
                <p>
                    <span><strong>Category: </strong></span>
                    <select name="category" id="category">
                        {% for category in categories %}
                        <option value="{{ category.pk }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </p>
            </li>
            <li>
                <label for="description">
                    <p><strong>Description: </strong></p>
                    {{ project_form.description }}
                </label>
            </li>
            <li>
                <label for="materials">
                    <p><strong>Materials: </strong></p>
                    {{ project_form.materials }}
                </label>
            </li>
            <li>
                <label for="steps">
                    <p><strong>Steps: </strong></p>
                    {{ project_form.steps }}
                </label>
            </li>
            <li>
                <p><button type="submit" name="action" value="project">Submit</button></p>
            </li>
        </ul>
    </form>
</div>
{% endblock %}
