{% extends 'base.html' %}

{% block body %}
    {% if projects %}
        <ul>
            {% for project in projects %}
                <li>
                    <h2>{{ project.title }}</h2>
                    <p><strong>Category:</strong> {{ project.category.name }}</p>
                    <p>{{ project.description }}</p>
                    <a href="{{ project.get_absolute_url }}">
                        View Details
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No projects available.</p>
    {% endif %}
{% endblock %}
