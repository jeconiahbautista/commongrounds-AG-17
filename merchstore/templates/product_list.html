{% extends 'base.html' %}
{% load static %}

{% block body %}
<h1> Commission Requests List</h1>
        <div class="main-content">
            {% for product in products %}
                <div class="card">
                    <ul>
                        <li>
                            <a href="{{ product.get_absolute_url }}">
                                {{ product.name }}
                            </a>
                            <p><strong>({{ product.product_type.name }})</strong></p>
                            <p>Php {{ product.price }} </p>
                            <a href="{{ product.get_absolute_url }}"> View Details </a>
                        </li>
                    </ul>
                </div>
            {% endfor %}
        </div>
{% endblock %}
