{% extends 'base.html' %}
{% load static %}

{% block body %}
<h1> Product List</h1>
        <div class="main-content">
            {% for product in products %}
                <div class="card">
                    <ul>
                        <li>
                            <h2>{{ product.name }}</h2>
                            <p><strong>({{ product.product_type.name }})</strong></p>
                            <p>Php {{ product.price }} </p>
                            <a href="{{ product.get_absolute_url }}">View Details</a>
                        </li>
                    </ul>
                </div>
            {% endfor %}
        </div>
{% endblock %}
