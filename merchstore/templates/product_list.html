{% extends 'base.html' %}


{% block body %}
    <h1>Products</h1>
    <ul>
        {% for product in products %}
            <li>
                <a href="{{ product.get_absolute_url }}">
                    {{ product.name }}
                </a>
                : {{ product.price }} ({{ product.product_type.name }})
            </li>
        {% endfor %} 
    </ul>
{% endblock %}
